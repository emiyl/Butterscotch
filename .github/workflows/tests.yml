name: Tests

on:
  workflow_run:
    workflows: [Build]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  butterscotch-linux-x86_64:
    name: Butterscotch Tests (GLFW/Linux x86_64)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    env:
      DOWNLOAD_COMMERCIAL_GAMES: ${{ github.event.workflow_run.head_repository.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download Butterscotch build artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: butterscotch-glfw-linux-x86_64
          path: build
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark Butterscotch binary executable
        run: chmod +x build/butterscotch

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Download Commercial Games
        if: env.DOWNLOAD_COMMERCIAL_GAMES == 'true'
        env:
          COMMERCIAL_GAMES_URL: ${{ secrets.COMMERCIAL_GAMES_URL }}
        run: |
          games=(
            undertale-ptbr-winpack
            underfavela
            deltarune-chapter4-105-beta
          )
          for game in "${games[@]}"; do
            echo "Downloading $game..."
            curl --fail --silent --show-error --location --output "tests/$game.zip" "$COMMERCIAL_GAMES_URL/$game.zip"
            unzip -q "tests/$game.zip" -d "tests/$game"
          done

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Butterscotch test suite
        working-directory: tests/Flowey
        run: |
          xvfb-run -a ./gradlew --no-daemon run --args="--test-suite ${{ github.workspace }}/tests/tests.conf --butterscotch-path ${{ github.workspace }}/build/butterscotch --skip-commercial-games=${{ env.DOWNLOAD_COMMERCIAL_GAMES != 'true' }}"

      - name: Upload test screenshots
        if: always()          # the test step exits 1 on failure; run regardless
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: |
            tests/**/actual.*.png
          if-no-files-found: ignore

  automated-ci-paths-linux-x86_64:
    name: Automated CI Paths Test (GLFW/Linux x86_64)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download Butterscotch build artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: butterscotch-glfw-linux-x86_64
          path: build
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark Butterscotch binary executable
        run: chmod +x build/butterscotch

      - name: Run paths game and validate output
        shell: bash
        run: |
          set -euo pipefail

          raw_output_file="${{ github.workspace }}/tests/automated-ci/paths/raw_output.txt"
          normalized_output_file="${{ github.workspace }}/tests/automated-ci/paths/actual_output.txt"
          expected_output_file="${{ github.workspace }}/tests/automated-ci/paths/expected_output.txt"

          timeout 120s "${{ github.workspace }}/build/butterscotch" \
            "${{ github.workspace }}/tests/automated-ci/paths/game.ios" \
            --headless \
            > "$raw_output_file" 2>&1

          grep '^Game: ' "$raw_output_file" | sed 's/^Game: //' > "$normalized_output_file"

          diff -u "$expected_output_file" "$normalized_output_file"

      - name: Upload paths test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automated-ci-paths-output
          path: |
            tests/automated-ci/paths/raw_output.txt
            tests/automated-ci/paths/actual_output.txt
          if-no-files-found: ignore
